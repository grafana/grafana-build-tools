          - ^scripts\/check-renovate-config$
          - ^scripts\/generate-renovate-config$
          - ^\.github\/workflows\/validate-renovate-config\.yaml$
      file_not_deleted:
        paths:
          - ^\.github\/workflows\/validate-renovate-config\.yaml$
    requires:
      conditions:
        has_workflow_result:
          conclusions:
            - skipped
            - success
          workflows:
            - .github/workflows/validate-renovate-config.yaml
  - name: default to approval
