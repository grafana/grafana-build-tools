          - ^scripts\/(?:(?:[^/]*(?:/|$))*)$
          - ^versions\.yaml$
      file_not_deleted:
        paths:
          - ^\.github\/workflows\/pr\.yml$
      targets_branch:
        pattern: (^main$)
    requires:
      conditions:
        has_workflow_result:
          conclusions:
            - skipped
            - success
          workflows:
            - .github/workflows/pr.yml
  - name: Workflow .github/workflows/validate-policybot-config.yaml succeeded or skipped
    if:
      changed_files:
        paths:
          - ^\.policy\.yml$
          - ^\.policy\.yml\.tmpl$
          - ^\.github\/workflows\/(?:[^/]*)$
          - ^scripts\/gen-policy-bot-config$
      file_not_deleted:
        paths:
          - ^\.github\/workflows\/validate-policybot-config\.yaml$
    requires:
      conditions:
        has_workflow_result:
          conclusions:
            - skipped
            - success
          workflows:
            - .github/workflows/validate-policybot-config.yaml
  - name: Workflow .github/workflows/validate-renovate-config.yaml succeeded or skipped
    if:
      changed_files:
        paths:
          - ^renovate\.(?:[^/]*)$
          - ^\.renovate\.(?:[^/]*)$
